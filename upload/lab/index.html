<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Porrrtfolio</title>
		<meta name="description" content="Portfolio!" />
		<link rel="stylesheet" href="../../style.css" />
		<link rel="icon" type="image/x-icon" href="favicon.ico" />
	</head>
	<body>
		<div class="add-background"></div>

		<header>
			<nav>
				<h2 class="visually-hidden" id="top-level-navigation-menu">
					Top level navigation menu
				</h2>
				<ul class="nav">
					<li class="nav-item">
						<a href="/porrrtfolio/" aria-current="page">start!</a>
					</li>
					<li class="nav-item">
						<a href="/porrrtfolio/dashboard/">dashboard</a>
					</li>
					<li class="nav-item">
						<a href="/porrrtfolio/upload/quiz/">upload quiz</a>
					</li>
					<li class="nav-item">
						<a href="/porrrtfolio/upload/lab/">upload lab</a>
					</li>
					<li class="nav-item">
						<a href="/porrrtfolio/upload/exam/">upload exam</a>
					</li>
				</ul>
			</nav>
		</header>

		<main id="justskip" class="content">
			<div class="main-content">
				<heading-anchors>
					<center><h1>Upload Lab</h1></center>
					<hr />
					<div class="subcontent">
						Name
						<input type="text" id="nameInput" />
						File
						<input
							type="file"
							id="fileInput"
							onchange="changeInputImage()"
						/>
						<img id="imagePreview" />
						<button type="button" onclick="sendInput()">
							Submit
						</button>
					</div>
				</heading-anchors>
			</div>
		</main>

		<style>
			.subcontent {
				display: flex;
				flex-direction: column;
				padding: 10px;
				gap: 2px;
			}
		</style>

		<script src="script.js"></script>
	</body>
</html>
